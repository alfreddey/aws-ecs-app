<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${labName}">AWS ECS Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #232f3e 0%, #ff9900 100%);
            color: #fff;
        }

        .card {
            background: rgba(0, 0, 0, 0.35);
            padding: 3rem 4rem;
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .lab {
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.85;
            margin-bottom: 1rem;
        }

        .name {
            font-size: 3rem;
            font-weight: 700;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="lab" th:text="${labName}">AWS ECS Lab V3</div>
        <div class="name" th:text="${fullName}">Alfred Dey...</div>
        <div class="footer">Spring Boot &middot; Running on Amazon ECS</div>
    </div>
</body>

</html>
